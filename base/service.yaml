apiVersion: v1
kind: Service
metadata:
  name: ai-agent
  labels:
    app.kubernetes.io/name: ai-agent
    app.kubernetes.io/part-of: openshift-ai-agent
spec:
  selector:
    app.kubernetes.io/name: ai-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8000
      targetPort: 8000
      protocol: TCP
