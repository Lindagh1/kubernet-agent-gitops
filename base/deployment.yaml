apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  labels:
    app.kubernetes.io/name: ai-agent
    app.kubernetes.io/part-of: openshift-ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-agent
        app.kubernetes.io/part-of: openshift-ai-agent
    spec:
      containers:
        - name: ai-agent
          image: ai-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-agent-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
