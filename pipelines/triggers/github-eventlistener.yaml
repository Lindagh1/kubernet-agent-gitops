apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: ai-agent-github-listener
  namespace: wksp-user1-cicd
  labels:
    app.kubernetes.io/name: ai-agent
    app.kubernetes.io/part-of: openshift-ai-agent
spec:
  serviceAccountName: ai-agent-eventlistener

  triggers:
    - name: github-push-main

      interceptors:
        - ref:
            name: github
            kind: ClusterInterceptor
            apiVersion: triggers.tekton.dev
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secretToken
            - name: eventTypes
              value:
                - push

        - ref:
            name: cel
            kind: ClusterInterceptor
            apiVersion: triggers.tekton.dev
          params:
            - name: filter
              value: "body.ref == 'refs/heads/main'"

      bindings:
        - ref: ai-agent-github-binding

      template:
        ref: ai-agent-build-template
